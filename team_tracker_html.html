<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Team Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
    
    <!-- Login Page -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-card max-w-md w-full p-8 rounded-3xl">
            <div class="text-center mb-8">
                <div class="inline-block p-4 bg-purple-500/20 rounded-full mb-4">
                    <svg class="w-16 h-16 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                </div>
                <h1 class="text-4xl font-bold text-white mb-2">Team Tracker</h1>
                <p class="text-gray-400">Select your name to continue</p>
            </div>
            
            <select id="userSelect" class="w-full p-4 bg-white/10 backdrop-blur-lg border border-white/20 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-purple-500 mb-4">
                <option value="">Choose your name...</option>
                <!-- Will be populated by JS -->
            </select>
            
            <button onclick="login()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-4 rounded-xl font-semibold hover:shadow-lg hover:shadow-purple-500/50 transition duration-300">
                Continue →
            </button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="mainDashboard" class="hidden">
        <!-- Header -->
        <header class="glass-card mx-4 mt-4 p-4 rounded-2xl">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-white">Support Team Tracker</h1>
                    <p class="text-gray-400" id="welcomeText">Welcome back</p>
                </div>
                <div class="flex items-center gap-6">
                    <!-- Live Clock -->
                    <div class="text-right">
                        <div id="liveTime" class="text-3xl font-bold text-white"></div>
                        <div id="liveDate" class="text-sm text-gray-400"></div>
                    </div>
                    <button onclick="logout()" class="p-3 hover:bg-white/10 rounded-lg transition">
                        <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <div class="p-4 grid grid-cols-1 lg:grid-cols-3 gap-4">
            
            <!-- Left Section - Calendar -->
            <div class="lg:col-span-1">
                <div class="glass-card p-6 rounded-2xl mb-4">
                    <h2 class="text-xl font-bold text-white mb-4">📅 Calendar</h2>
                    <div id="calendar" class="text-white">
                        <!-- Calendar will be generated here -->
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="glass-card p-6 rounded-2xl">
                    <h2 class="text-xl font-bold text-white mb-4">Quick Actions</h2>
                    <div class="space-y-3">
                        <button onclick="checkIn()" class="w-full bg-green-500 hover:bg-green-600 text-white py-3 px-4 rounded-xl font-semibold transition flex items-center justify-center gap-2">
                            <span>🟢</span> Check In
                        </button>
                        <button onclick="takeBreak()" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 px-4 rounded-xl font-semibold transition flex items-center justify-center gap-2">
                            <span>☕</span> Take Break
                        </button>
                        <button onclick="markLeave()" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 px-4 rounded-xl font-semibold transition flex items-center justify-center gap-2">
                            <span>📅</span> Mark Leave
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Section - Timeline & Status -->
            <div class="lg:col-span-2 space-y-4">
                
                <!-- Stats Cards -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="glass-card p-4 rounded-xl">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-gray-400 text-sm">Working</span>
                            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                        </div>
                        <div id="workingCount" class="text-3xl font-bold text-green-400">0</div>
                    </div>
                    <div class="glass-card p-4 rounded-xl">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-gray-400 text-sm">Pending</span>
                            <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                        </div>
                        <div id="pendingCount" class="text-3xl font-bold text-yellow-400">0</div>
                    </div>
                    <div class="glass-card p-4 rounded-xl">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-gray-400 text-sm">On Break</span>
                            <div class="w-3 h-3 bg-orange-500 rounded-full"></div>
                        </div>
                        <div id="breakCount" class="text-3xl font-bold text-orange-400">0</div>
                    </div>
                    <div class="glass-card p-4 rounded-xl">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-gray-400 text-sm">On Leave</span>
                            <div class="w-3 h-3 bg-red-500 rounded-full"></div>
                        </div>
                        <div id="leaveCount" class="text-3xl font-bold text-red-400">0</div>
                    </div>
                </div>

                <!-- 24-Hour Visual Timeline Road -->
                <div class="glass-card p-6 rounded-2xl">
                    <h2 class="text-xl font-bold text-white mb-4">⏰ 24-Hour Timeline</h2>
                    <div class="relative">
                        <!-- Time markers -->
                        <div class="flex justify-between text-xs text-gray-400 mb-2">
                            <span>12AM</span>
                            <span>3AM</span>
                            <span>6AM</span>
                            <span>9AM</span>
                            <span>12PM</span>
                            <span>3PM</span>
                            <span>6PM</span>
                            <span>9PM</span>
                            <span>12AM</span>
                        </div>
                        
                        <!-- Timeline container -->
                        <div id="timeline" class="space-y-2">
                            <!-- Timeline will be generated here -->
                        </div>

                        <!-- Current time indicator -->
                        <div id="timeIndicator" class="absolute top-0 bottom-0 w-1 bg-purple-500 shadow-lg shadow-purple-500/50" style="left: 0%">
                            <div class="absolute -top-2 left-1/2 transform -translate-x-1/2 w-4 h-4 bg-purple-500 rounded-full animate-pulse"></div>
                        </div>
                    </div>
                </div>

                <!-- Team Status List -->
                <div class="glass-card p-6 rounded-2xl">
                    <h2 class="text-xl font-bold text-white mb-4">👥 Team Status</h2>
                    <div id="teamStatus" class="space-y-2">
                        <!-- Team status will be generated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // Firebase configuration - REPLACE WITH YOUR CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Make database globally available
        window.db = database;
    </script>

    <script src="app.js"></script>
</body>
</html>
